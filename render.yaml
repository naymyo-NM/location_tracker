# Render Blueprint: Laravel tracking API
# Use internal PostgreSQL URL when this service runs on Render.
services:
  - type: web
    runtime: docker
    name: tracking-api
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
